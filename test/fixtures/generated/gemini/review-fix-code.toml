description = "Review source scopes with advisory-only read-only findings for review-fix-code."

[metadata]
route_name = "review-fix-code"
review_target = "source-scope"
package_version = "0.0.0-snapshot"

[prompt]
text = '''
Route name: review-fix-code
Review target: source scope file set
Package version: 0.0.0-snapshot

Use this Gemini command with optional `scope=<path>` tokens (repeat `scope=<path>` for multiple roots; omit scope to review the project root), optional `read-only`, optional `guard=git|snapshot`, optional `root=<project-root>`, and optional `debug`.
A whole-root CODE review within the single-pass budget of 300 files or 1,500,000 bytes (counted after all exclusions) runs in one pass; a larger whole-root file set is reviewed as a partitioned project review (a deterministic, multi-phase, unit-by-unit review) instead of blocking — narrow with `scope=<path>` or ignore rules to keep it a single pass. Version-control-ignored files are excluded automatically via local read-only git queries (tracked files are never ignored; non-git roots skip this source). A project-root `.drfxignore` file adds user exclusions with `.gitignore` syntax (globs, `!` negation, `/` anchoring, trailing-`/` directory-only patterns). An explicit `scope=` always wins: a scoped directory or file is reviewed even when an ignore source covers it.
This is a code route and is advisory-only on Gemini: `review-and-fix` is unsupported, workflow PASS is unavailable, Gemini must not edit files, and it must not claim workflow PASS.
It does not accept `target=`, `ref=`, `strict`, `normal`, `assurance=`, `ledger=`, or `rounds=`.
Help-style or invalid invocations explain usage without reading files, running probes, creating state, or declaring review results.

Route contract:
- This route reviews a source scope: the file set under one or more scope=<path> roots, or the whole project root when scope= is omitted.
- A whole-root CODE review within the single-pass budget of 300 files or 1,500,000 bytes (counted after all exclusions) runs in one pass; a larger whole-root file set is reviewed as an advisory partitioned project review (multi-phase, unit-by-unit; Gemini stays advisory-only and never claims PASS) instead of blocking — narrow with scope=<path> or ignore rules to keep it a single pass.
- Version-control-ignored files are excluded automatically (local read-only git queries; tracked files are never ignored; non-git roots skip this source). A project-root .drfxignore file adds user exclusions with .gitignore syntax. An explicit scope= (directory or file) always wins over every ignore source.
- Users must not pass target=, type, ref=, base=, assurance=, strict, normal, or ledger=; this route has no document type and no reference documents.
- The review judges the resolved source file set, not a single document. Discover the in-scope source files deterministically, then review correctness, architecture, state-and-io, safety, tests, contracts, and maintainability.
- Code review is actionable-only: pure style preferences, no-risk refactors, and over-abstraction are not blocking.
- Public CLI commands are drfx doctor, drfx install, and drfx uninstall; drfx workflow is the internal deterministic interface used by this generated route.
- The CLI validates workflow state and parses machine payloads. Semantic review, semantic triage, diff judgment, and final coordinator agreement are LLM work.
- Gemini routes are no-state advisory routes; do not read or reuse .drfx/targets/<target-key>/ for resume/reset.
- Gemini is advisory-only.
- Gemini v1 code review is advisory-only and produces read-only findings.
- review-and-fix is unsupported on Gemini; automatic fixing is unavailable in Gemini v1.
- workflow PASS is unavailable in Gemini v1; Gemini must not claim workflow PASS.
- Gemini must not edit source files or workflow state except through no-state workflow outputs.
- Do not call, wrap, or delegate to a platform-native code-review command; this route only produces advisory read-only findings.
- When the whole-root source file set exceeds the single-pass budget, the route runs as **partitioned project review** across three **independently-mergeable / independently-usable phases**: (1) a deterministic partition plan; (2) bounded read-only per-unit advisory findings with coverage receipts; (3) aggregate advisory findings. Each phase leaves usable advisory output even if the next never runs.
- A partitioned run on Gemini is advisory-only and **never claims a workflow PASS**; Gemini must not claim PASS at any phase.
- When the aggregate phase cannot cover every partitioned unit, Gemini reports the uncovered units as advisory `coverage-incomplete` findings with a coverage-deferral owner and next action; it remains advisory-only and never claims PASS.

Invocation:
review-fix-code [scope=<path>...] [read-only] [guard=git|snapshot] [root=<project-root>] [debug]

Full form: review-fix-code [scope=<path>...] ... . scope=<path> names a source root to review; repeat scope=<path> for multiple roots. Omit scope= to review the whole project root within a single-pass budget of 300 files or 1,500,000 bytes; a larger whole-root file set is reviewed as a partitioned project review (a deterministic, multi-phase, unit-by-unit review) instead of blocking — narrow with scope=<path> or ignore rules to keep it a single pass. Version-control-ignored files are excluded automatically (local read-only git queries; tracked files are never ignored; non-git roots skip this source). A project-root .drfxignore file adds user exclusions with .gitignore syntax (globs, ! negation, / anchoring, trailing-/ directory-only patterns). scope=<path> may name a directory or a single file, and an explicit scope= always wins over every ignore source. There is no bare-path or target= form for this route. Before workflow commands, materialize <scopeTokens> as the repeated scope=<path> tokens exactly as requested, or as an empty string when scope is omitted.

This route accepts only scope=<path> (repeatable), optional read-only, optional guard=git|snapshot, optional root=<project-root>, and optional debug. It does not accept ref=, base=, strict, normal, assurance=, ledger=, or rounds=. Explicit review-and-fix is unsupported on Gemini and must render the unsupported result instead of starting a fix loop.

This is a Gemini code route and is advisory-only. When no mode token is present, materialize read-only. When no assurance token is present, materialize advisory. Use Claude Code, Codex, or opencode for review-and-fix. workflow PASS is unavailable; Gemini must not claim workflow PASS and must not run automatic fixes.

Help-style or invalid invocations explain usage only. Do not read scope files, do not run workflow commands, do not run probes, do not create state, and do not declare a review result.

Before any drfx workflow command, materialize <selectedGuard> from explicit guard or default git, and pass guard=<selectedGuard> to the workflow command.

Route output:

Default output is concise. It must not print `Goal / Now / Next / Open Questions`, the 14-line final-response machine block, raw workflow JSON, runtime probe transcripts, reviewer/fixer prompt text, or raw subagent transcripts.

Default output must include only terminal status, target path, advisory issue summaries, unresolved issue summaries, blocker or unsupported reason, one next action when blocked or unsupported, and state directory or receipt path only when needed for resume, audit, or follow-up.

Do not expose internal issue IDs such as `ISSUE-001` in default `Issues:` or `Unfixed:` lists.

For read-only findings:

```text
Findings: <target> has blocking issues.

Issues:
- Location: <line, heading, section, or safe anchor>
  Problem: <specific problem>
  Fix: <suggested correction>

Next: apply fixes manually, or rerun with a Codex/Claude Code/opencode review-and-fix route.
```

For clean read-only runs:

```text
Clean: <target> has no blocking findings.

Verification: full file-set read-only review completed.
```

For unsupported review-and-fix or strict-verified requests:

```text
Unsupported: <target> requested a mode or assurance unavailable on Gemini.

Reason: review-and-fix or strict-verified is unavailable on Gemini.
Next: rerun with Codex, Claude Code, or opencode for review-and-fix, or use read-only advisory review.
```

For blocked advisory runs:

```text
Blocked: <one-sentence reason>.

Unfixed:
- Location: <line, heading, section, or safe anchor>
  Problem: <specific problem that remains>
  Needed: <decision, manual input, or environmental fix required>

Next: <one concrete action>
State: <target-state-dir when persistent state exists>
```

Blocked wording must distinguish normalized blocker codes.

Blocked: <target> cannot be auto-fixed because it lacks a clean rollback anchor.

Next: commit or restore the target, rerun with read-only, or use guard=snapshot when Git rollback is unavailable.

When workflow finalization returns archiveWarning, default output must include an archive warning line and a concrete next action to clear the leftover state directory (delete or reset) so the next run can start fresh. Example:

Archive warning: state directory could not be archived; it remains at <state-dir>.

Next: delete or reset the leftover state directory, then rerun.

When debug is present, generated routes may print the final-response machine block, target state directory, receipt paths, normalized blocker/status reason, runtime probe results, artifact paths, relevant drfx workflow --json=full outputs, report paths, issue IDs, and the redacted archiveWarning field when present. Debug output must still redact sensitive values and must not print raw target body, must not print raw reference body, must not print raw prompts, must not print raw subagent transcripts, and must not print secrets, tokens, or raw logs. Debug must not change final status, effective mode, assurance, validation behavior, or persisted state.

review-and-fix is unsupported on Gemini. Before reading target/reference bodies or generating any semantic payload, return the unsupported result through no-state preflight:

drfx workflow preflight --no-state review-fix-code <scopeTokens> review-and-fix guard=<selectedGuard> --assurance advisory --runtime-platform gemini --runtime-subagent-probe not-required --runtime-stdin-handoff not-required --runtime-downgrade-reason none --terminal-status unsupported --blocking-reason none --status-reason unsupported-runtime-capability --json=compact

If the user requests strict verified assurance, explain that Gemini remains advisory-only and do not issue a strict verified workflow command.

Read-only advisory flow:
1. Confirm real stdin handoff before semantic payload commands: start the command as a process/session, obtain a stdin handle, write payload bytes, send EOF, and read exit code plus stdout/stderr.
2. On stdin handoff failure, fail closed as unsafe-handoff-file before semantic handoff. Do not use shell pipes, heredocs, herestrings, command substitution, argv, environment variables, env vars, or raw temp files for semantic payloads.
3. Start review-backed no-state context:

drfx workflow context --no-state review-fix-code <scopeTokens> read-only guard=<selectedGuard> --assurance advisory --runtime-platform gemini --runtime-subagent-probe not-required --runtime-stdin-handoff ready --runtime-downgrade-reason none --phase initial-review --json=compact

4. Keep reviewGuard and stateToken in coordinator memory only. Never write tokens to the filesystem and never hand-edit tokens.
5. Build the reviewer prompt in memory from the context skeleton plus target/reference reads. Gemini produces advisory review content; it must not claim workflow PASS.
6. Submit review, triage, and final response by repeating the same runtime fields:

drfx workflow record-review --no-state review-fix-code <scopeTokens> read-only guard=<selectedGuard> --assurance advisory --runtime-platform gemini --runtime-subagent-probe not-required --runtime-stdin-handoff ready --runtime-downgrade-reason none --phase initial-review --review-guard <reviewGuard> --result-stdin --json=compact
drfx workflow record-triage --no-state review-fix-code <scopeTokens> read-only guard=<selectedGuard> --assurance advisory --runtime-platform gemini --runtime-subagent-probe not-required --runtime-stdin-handoff ready --runtime-downgrade-reason none --phase initial-review --state-token <latestStateToken> --triage-stdin --json=compact
drfx workflow finalize --no-state review-fix-code <scopeTokens> read-only guard=<selectedGuard> --assurance advisory --runtime-platform gemini --runtime-subagent-probe not-required --runtime-stdin-handoff ready --runtime-downgrade-reason none --state-token <latestStateToken> --final-response-stdin --json=compact

No-state final status is read-only-clean, read-only-findings, blocked, or unsupported; never pass. (Review-and-fix terminal states such as stopped-no-progress, stopped-with-deferrals, and pass are unavailable in Gemini advisory-only mode.)

Embedded shared content:

<<<EMBEDDED_SHARED_CONTENT_MASKED>>>
'''
